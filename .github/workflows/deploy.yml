name: Deploy Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          # This tells your frontend how to find your Homelab
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-backend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Install Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          script: |
            set -e
            cd /home/aayog/claude/homelab_dashboard
            git pull origin main

            # 1. Setup Environment
            cat > backend/.env << 'ENVEOF'
            FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}
            ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}
            GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}
            DEFAULT_LAT=43.0389
            DEFAULT_LON=-87.9065
            ENVEOF

            # 2. Update backend
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 3. RESTART (The part the other AI forgot!)
            sudo systemctl restart dashboard-backend
