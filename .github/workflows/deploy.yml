name: Deploy Dashboard

on:
  push:
    branches: [main]

# Necessary permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          # Use the environment variable you saved in GitHub
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Fix Jekyll 404s
        run: touch frontend/dist/.nojekyll

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          script: |
            set -e
            cd /home/aayog/claude/homelab_dashboard
            git pull origin main

            # 1. Write .env without leading whitespace (printf avoids heredoc indentation issues)
            printf '%s\n' \
              'FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}' \
              'ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}' \
              'GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}' \
              'DEFAULT_LAT=43.0389' \
              'DEFAULT_LON=-87.9065' \
              'CERT_FILE=/home/aayog/.certs/homelab.crt' \
              'KEY_FILE=/home/aayog/.certs/homelab.key' \
              > backend/.env

            # 2. Update backend dependencies (includes gunicorn)
            cd backend
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt

            # 3. Fix cert ownership — 'tailscale cert' run as root leaves files owned by
            #    root:root, making the key unreadable by the service user (aayog). This causes
            #    gunicorn to fail the SSL handshake on every connection (PermissionError).
            sudo chown aayog:aayog /home/aayog/.certs/homelab.crt /home/aayog/.certs/homelab.key 2>/dev/null || true

            # 4. Restart the service
            sudo systemctl restart dashboard-backend
