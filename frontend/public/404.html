<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homelab Dashboard</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Converts the 404 path into a query param and redirects to index.html,
      // which then restores the path via the script in index.html.
      var seg = 1; // number of path segments to keep (1 = /homelab-dashboard/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
